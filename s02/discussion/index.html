<!-- Comments (cmd/ctr + /) -->
<!-- useful for proper documentation and allow developers to write/understand their code better -->

<!DOCTYPE html>
<!-- Tells the browser to read the contents od the file as HTML -->
<html>
	<!-- Contains the details of the HTML file that are visible to the browser. -->
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Introduction</title>
	</head>
	<!-- Contains the actual content of the HTML file that are visible to the browser. -->
	<body>
<!-- Creates a heading text. -->
<!-- h1 to be the largest size. -->
<!-- h6 to be the smallest heading -->
		<h1>Zuitt Open House</h1>
		<a href="#bottom">Link to Bottom</a>

		<h2>John Doe</h2>

		<!-- Creates a paragraph text. -->
		<p>
		Welcome to Zuitt!
		<!-- Creates a line break in between text. -->
		<br>
		Let's enumerate all the things that we will study in this three day workshop.
	</p>

	<h3>Free Coding Bootcamp</h3>

	<!-- Creates ordered list with number indicators by default. -->
	<ol>
		<!-- Create list item. -->
		<li>Git Basics</li>
		<li>HTML</li>
		<li>CSS</li>
	</ol>

		<div>
			<!-- Relative links are links to othe pages in the same website domain. -->
			<h4>Relative Links</h4>
			<!-- ./ to link another html page within the same directory/folder. -->
			<a href="./attributes.html">Attributes Page</a>
			<a href="./links.html">Links Page</a>
			<a href="./index.html">Index Page</a>
		</div>

		<br>
		<div id="images">
			<br>
			<img src="./picture1.png">
			<br>
			<img src="./picture2.png">
			<br>
			<img src="./picture3.png">
		</div>
		<br>

		<div id="bottom">
			<h4>Within Page Relative Links</h4>
			<a href="#top">Return to Top</a>
		</div>
	</body>
</html>
