<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>HTML Hyperlinks</title>
	</head>
	<body>
		<h1>HTML Hyperlinks</h1>
		<p>
			HTML hyperlinks are created using the anchor tag with the href attribute
		</p>
		<h3>There are two kinds of links:</h3>
		<!-- Creates an unordered list with bullet indicators instead of a number. -->
		<ul>
			<li>absolute</li>
			<li>relative</li>
		</ul>

		<div>
			<h4>Absolute Link</h4>
			<a href="https://www.linkedin.com">LinkedIn</a>
			<!-- Target attribute with the value "_blank" will create a new tab instead of replacing our page. -->
			<a href="https://zuitt.co" target="_blank">Zuitt Coding Bootcamp</a>
		</div>

		<div>
			<!-- Relative links are links to othe pages in the same website domain. -->
			<h4>Relative Links</h4>
			<!-- ./ to link another html page within the same directory/folder. -->
			<a href="./attributes.html">Attributes Page</a>
			<a href="./links.html">Links Page</a>
			<a href="./index.html">Index Page</a>
		</div>

	</body>
</html>
